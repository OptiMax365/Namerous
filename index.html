<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>∞ Infinite Naming Engine</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#090910;
  --card:#101019;
  --border:#1a1a2e;
  --glow:#00f0ff;
  --glow2:#a855f7;
  --glow3:#f97316;
  --text:#e8e8f0;
  --dim:#646480;
  --success:#22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
}

/* ================= BACKGROUND ================= */

.spiral-bg{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.spiral-ring{
  position:absolute;
  top:50%;
  left:50%;
  border-radius:50%;
  border:1px solid rgba(0,240,255,0.05);
  animation:spin linear infinite;
}

@keyframes spin{
  0%{
    transform:translate(-50%,-50%) rotate(0deg) scale(1);
    opacity:0.5;
  }
  100%{
    transform:translate(-50%,-50%) rotate(360deg) scale(.25);
    opacity:0;
  }
}

/* ================= MAIN ================= */

.app{
  position:relative;
  z-index:2;
  width:100vw;
  height:100vh;
  padding:10px;
}

.main-card{
  width:100%;
  height:100%;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:
    0 0 60px rgba(0,240,255,0.06),
    inset 0 0 100px rgba(0,0,0,0.5);
}

/* ================= HEADER ================= */

.header{
  flex-shrink:0;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg, rgba(0,240,255,0.06), transparent);
}

.header h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(.8rem,2vw,1.2rem);
  letter-spacing:2px;
  font-weight:900;
  background:linear-gradient(135deg,var(--glow),var(--glow2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.badge{
  padding:5px 12px;
  border-radius:999px;
  border:1px solid rgba(0,240,255,.25);
  background:rgba(0,240,255,.08);
  color:var(--glow);
  font-size:.6rem;
}

/* ================= TOP PANELS ================= */

.top-bar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.top-box{
  min-height:120px;
  background:rgba(0,0,0,.35);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  overflow:hidden;
  position:relative;
}

.top-label{
  font-family:'Orbitron',sans-serif;
  color:var(--dim);
  font-size:.55rem;
  letter-spacing:2px;
  margin-bottom:8px;
}

/* ============ SEQUENTIAL READER FIX ============ */

#tickerDisplay{
  width:100%;
  height:calc(100% - 22px);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
  line-height:1.15;
  padding:6px;
  font-family:'Orbitron',sans-serif;
  color:var(--glow);
  font-weight:700;

  /* AUTO SIZE */
  font-size:clamp(.65rem, 2vw, 1.6rem);
}

#tickerDisplay.empty{
  color:var(--dim);
}

/* ================= SHUFFLER ================= */

#shufflerDisplay{
  position:relative;
  width:100%;
  height:calc(100% - 22px);
  overflow:hidden;
}

.shuffle-word{
  position:absolute;
  padding:4px 8px;
  background:rgba(168,85,247,.12);
  border:1px solid rgba(168,85,247,.3);
  border-radius:6px;
  color:var(--glow2);
  font-size:.7rem;
  animation:showWord .4s ease forwards;
  max-width:95%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

@keyframes showWord{
  from{
    opacity:0;
    transform:scale(.8) translateY(10px);
  }
  to{
    opacity:1;
    transform:scale(1) translateY(0);
  }
}

@keyframes hideWord{
  to{
    opacity:0;
    transform:translateY(-8px) scale(.9);
  }
}

/* ================= CONTENT GRID ================= */

.content{
  flex:1;
  display:grid;
  grid-template-columns:290px 1fr;
  overflow:hidden;
}

/* ================= LEFT ================= */

.left{
  border-right:1px solid var(--border);
  background:rgba(0,0,0,.15);
  padding:12px;
  overflow:auto;
}

.left::-webkit-scrollbar{
  width:4px;
}

.left::-webkit-scrollbar-thumb{
  background:var(--glow);
}

.section-title{
  font-family:'Orbitron',sans-serif;
  font-size:.55rem;
  color:var(--glow);
  margin-bottom:6px;
  letter-spacing:2px;
}

textarea{
  width:100%;
  height:85px;
  resize:none;
  border:none;
  outline:none;
  background:rgba(0,0,0,.4);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  padding:10px;
  font-family:'Share Tech Mono', monospace;
  font-size:.75rem;
}

textarea:focus{
  border-color:var(--glow);
}

.word-input{
  position:relative;
}

.paste-btn{
  position:absolute;
  top:6px;
  right:6px;
  border:none;
  border-radius:6px;
  background:rgba(168,85,247,.2);
  border:1px solid rgba(168,85,247,.3);
  color:var(--glow2);
  padding:4px 8px;
  font-size:.55rem;
  cursor:pointer;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
  font-size:.6rem;
  font-weight:700;
  letter-spacing:1px;
  transition:.25s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-generate{
  background:linear-gradient(135deg,var(--glow),#0090aa);
  color:#000;
}

.btn-cycle{
  background:linear-gradient(135deg,var(--success),#15803d);
  color:#fff;
}

.progress{
  width:100%;
  height:3px;
  background:rgba(255,255,255,.05);
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--glow),var(--glow2));
}

.stored{
  margin-top:14px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
  border-radius:10px;
  min-height:120px;
  max-height:220px;
  overflow:auto;
  padding:8px;
}

.tag{
  display:inline-block;
  margin:3px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(0,240,255,.06);
  border:1px solid rgba(0,240,255,.15);
  color:var(--glow);
  font-size:.6rem;
}

/* ================= RIGHT ================= */

.right{
  display:grid;
  grid-template-rows:1fr 320px;
  overflow:hidden;
}

.panel{
  padding:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.output-box{
  flex:1;
  margin-top:8px;
  background:rgba(0,0,0,.28);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:auto;
  padding:8px;
}

.output-box::-webkit-scrollbar{
  width:5px;
}

.output-box::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--glow),var(--glow2));
}

.name-entry{
  padding:6px 8px;
  margin:2px 0;
  border-left:2px solid transparent;
  border-radius:0 6px 6px 0;
  font-size:.72rem;
  cursor:pointer;
  transition:.2s;
  word-break:break-word;
}

.name-entry:hover{
  background:rgba(0,240,255,.06);
  border-left-color:var(--glow);
}

.pre{
  color:var(--glow);
}

.suf{
  color:var(--dim);
}

.res{
  color:var(--text);
}

/* ================= SPIRAL ================= */

.spiral-wrap{
  position:relative;
  flex:1;
  background:rgba(0,0,0,.3);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  min-height:260px;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.spiral-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.big-num{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2rem,5vw,4rem);
  font-weight:900;
  background:linear-gradient(135deg,var(--glow),var(--glow2),var(--glow3));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.spiral-label{
  font-size:.6rem;
  color:var(--dim);
  letter-spacing:3px;
}

/* ================= MOBILE WORD VIEWER ================= */

.mobile-viewer{
  display:none;
  flex-shrink:0;
  padding:12px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,.3);
}

.viewer-card{
  background:rgba(0,0,0,.45);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.viewer-word{
  min-height:70px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:var(--glow);
  font-family:'Orbitron',sans-serif;
  font-weight:700;
  line-height:1.2;
  word-break:break-word;
  overflow-wrap:anywhere;
  font-size:clamp(.9rem,4vw,1.4rem);
}

.viewer-controls{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.viewer-controls button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-family:'Orbitron',sans-serif;
  font-size:.65rem;
}

.copy-btn{
  background:linear-gradient(135deg,var(--glow),#0090aa);
  color:#000;
}

.nav-btn{
  background:rgba(168,85,247,.15);
  border:1px solid rgba(168,85,247,.3);
  color:var(--glow2);
}

/* ================= FOOTER ================= */

.log{
  flex-shrink:0;
  padding:10px 14px;
  border-top:1px solid var(--border);
  font-size:.6rem;
  color:var(--dim);
}

/* ================= MOBILE ================= */

@media (max-width:900px){

  body{
    overflow:auto;
  }

  .app{
    height:auto;
    min-height:100vh;
    overflow:auto;
  }

  .main-card{
    height:auto;
    min-height:100vh;
  }

  .content{
    grid-template-columns:1fr;
    overflow:visible;
  }

  .left{
    border-right:none;
    border-bottom:1px solid var(--border);
  }

  .right{
    grid-template-rows:auto auto;
  }

  .top-bar{
    grid-template-columns:1fr;
  }

  .top-box{
    min-height:100px;
  }

  /* MOBILE SPIRAL BIGGER */
  .spiral-wrap{
    min-height:420px;
  }

  /* HIDE FILE BUTTONS ON MOBILE */
  .desktop-only{
    display:none !important;
  }

  /* SHOW MOBILE VIEWER */
  .mobile-viewer{
    display:block;
  }

  /* OUTPUT SMALLER */
  .output-box{
    max-height:250px;
  }

  /* SEQ TEXT */
  #tickerDisplay{
    font-size:clamp(.8rem,5vw,1.2rem);
  }
}

@media (max-width:600px){

  .header{
    padding:12px;
  }

  .header h1{
    font-size:.8rem;
    letter-spacing:1px;
  }

  .badge{
    font-size:.5rem;
    padding:4px 8px;
  }

  .top-box{
    min-height:90px;
  }

  .spiral-wrap{
    min-height:460px;
  }

  .viewer-word{
    min-height:85px;
  }

  .name-entry{
    font-size:.66rem;
  }

  .big-num{
    font-size:2.6rem;
  }
}

</style>
</head>

<body>

<div class="spiral-bg" id="spiralBg"></div>

<div class="app">

<div class="main-card">

  <!-- HEADER -->
  <div class="header">
    <h1>⚡ INFINITE NAMING ENGINE</h1>
    <div class="badge" id="statusBadge">STANDBY</div>
  </div>

  <!-- TOP -->
  <div class="top-bar">

    <div class="top-box">
      <div class="top-label">⏱ SEQUENTIAL READER</div>
      <div id="tickerDisplay" class="empty">
        Awaiting Generation...
      </div>
    </div>

    <div class="top-box">
      <div class="top-label">🔀 TOP MAKINGS</div>
      <div id="shufflerDisplay"></div>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- LEFT -->
    <div class="left">

      <div class="section-title">INPUT WORDS</div>

      <div class="word-input">
        <textarea id="wordInput" placeholder="Paste words here...&#10;ARTIFICIAL INTELLIGENCE"></textarea>
        <button class="paste-btn" onclick="pasteFromClipboard()">📋 PASTE</button>
      </div>

      <button class="btn btn-generate" onclick="generateNames()">
        ⚡ GENERATE
      </button>

      <button class="btn btn-cycle" onclick="toggleInfiniteCycle()">
        ∞ INFINITE CYCLE
      </button>

      <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- DESKTOP ONLY -->
      <div class="desktop-only">

        <button class="btn"
        style="background:linear-gradient(135deg,var(--glow2),#7c3aed);color:#fff"
        onclick="saveToFile()">
          💾 SAVE FILE
        </button>

        <button class="btn"
        style="background:linear-gradient(135deg,var(--glow3),#c2410c);color:#fff"
        onclick="appendToFile()">
          📎 APPEND FILE
        </button>

      </div>

      <div style="margin-top:14px">

        <div class="section-title">STORED WORDS</div>

        <div class="stored" id="storedWords">
          <span style="color:var(--dim);font-size:.7rem">
            No words stored yet...
          </span>
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="panel">

        <div class="section-title">
          📜 GENERATED NAMES
        </div>

        <div class="output-box" id="outputBox">
          <div style="color:var(--dim);padding:20px;text-align:center">
            ✦ Enter words and press Generate ✦
          </div>
        </div>

      </div>

      <div class="panel">

        <div class="section-title">
          🌀 SPIRAL OF TIME
        </div>

        <div class="spiral-wrap">

          <canvas id="spiralCanvas"></canvas>

          <div class="spiral-overlay">
            <div class="big-num" id="bigNum">0</div>
            <div class="spiral-label">TOTAL NAMES</div>
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- MOBILE WORD VIEWER -->
  <div class="mobile-viewer">

    <div class="viewer-card">

      <div class="viewer-word" id="mobileWordViewer">
        No words generated yet
      </div>

      <div class="viewer-controls">
        <button class="nav-btn" onclick="prevMobileWord()">⬅ BACK</button>
        <button class="copy-btn" onclick="copyMobileWord()">📋 COPY</button>
        <button class="nav-btn" onclick="nextMobileWord()">NEXT ➡</button>
      </div>

    </div>

  </div>

  <!-- LOG -->
  <div class="log" id="logText">
    System initialized. Ready for generation...
  </div>

</div>
</div>

<script>

/* ================= ITERATORS ================= */

const ITERATOR_LIST = [
"am","an","as","at","be","by","do","go","he","hi","if","in","is","it","me","my","no","of","on","or","ox","up","us","we","ad","ah","ai","al","aw","ba","bi","bo","da","ed","eh","el","em","er","ex","fa","ha","ho","id","jo","ka","ki","la","li","lo",
"ace","act","add","air","arm","art","bag","boy","bus","cap","car","cup","ear","fan","fun","gem","hat","jar","key","map","net","owl","pen","sun","top","van","war","all","and","any","bar","big","bit","can"
];

/* ================= STATE ================= */

let storedWords = [];
let allGeneratedNames = [];
let totalGenerated = 0;

let cycleActive = false;
let cycleInterval = null;

let seqInterval = null;
let seqIndex = 0;

let shuffleInterval = null;

let mobileIndex = 0;

/* ================= INIT ================= */

document.addEventListener('DOMContentLoaded', ()=>{

  initSpiralBg();

  resizeCanvas();

  window.addEventListener('resize', resizeCanvas);

  drawSpiral();

});

/* ================= BG ================= */

function initSpiralBg(){

  const bg = document.getElementById('spiralBg');

  for(let i=0;i<28;i++){

    const ring = document.createElement('div');

    ring.className = 'spiral-ring';

    const size = 50 + i * 28;

    ring.style.width = size + 'px';
    ring.style.height = size + 'px';
    ring.style.animationDuration = (3 + i * .35) + 's';

    bg.appendChild(ring);
  }
}

/* ================= GENERATION ================= */

function generateForWord(word){

  const results = [];

  const w = word.toUpperCase();

  for(const item of ITERATOR_LIST){

    const prefix = item.toUpperCase();

    for(let i=0;i<=w.length;i++){

      const suffix = w.substring(i);

      results.push({
        pre:prefix,
        suf:suffix,
        res:prefix + suffix
      });
    }
  }

  return results;
}

function processAllWords(){

  let all = [];

  for(const w of storedWords){

    all = all.concat(generateForWord(w));
  }

  return all;
}

function generateNames(){

  const input = document.getElementById('wordInput').value.trim();

  if(!input){

    log('⚠ Enter words first');

    return;
  }

  const words = input
  .split(/[\s,;|\n]+/)
  .filter(w=>w.length);

  words.forEach(w=>{

    const up = w.toUpperCase();

    if(!storedWords.includes(up)){

      storedWords.push(up);
    }
  });

  updateStoredWords();

  const batch = processAllWords();

  allGeneratedNames = allGeneratedNames.concat(batch);

  totalGenerated = allGeneratedNames.length;

  displayResults(batch);

  updateStats();

  startTicker();

  initShuffler();

  updateMobileViewer();

  document.getElementById('statusBadge').textContent = 'GENERATED';

  log(`✓ Generated ${batch.length.toLocaleString()} names`);
}

/* ================= DISPLAY ================= */

function displayResults(batch){

  const box = document.getElementById('outputBox');

  if(box.children.length === 1){

    box.innerHTML = '';
  }

  const frag = document.createDocumentFragment();

  batch.forEach(item=>{

    const div = document.createElement('div');

    div.className = 'name-entry';

    div.innerHTML = `
      <span class="pre">${item.pre}</span>
      <span class="suf"> + ${item.suf}</span>
      =
      <span class="res">${item.res}</span>
    `;

    div.onclick = ()=>{

      navigator.clipboard.writeText(item.res);

      log(`📋 Copied: ${item.res}`);

      mobileIndex = allGeneratedNames.findIndex(a=>a.res===item.res);

      updateMobileViewer();
    };

    frag.appendChild(div);
  });

  box.appendChild(frag);

  box.scrollTop = box.scrollHeight;
}

function updateStoredWords(){

  const box = document.getElementById('storedWords');

  box.innerHTML = '';

  storedWords.forEach(w=>{

    const t = document.createElement('span');

    t.className = 'tag';

    t.textContent = w;

    box.appendChild(t);
  });
}

function updateStats(){

  document.getElementById('bigNum').textContent =
  totalGenerated.toLocaleString();
}

/* ================= MOBILE VIEWER ================= */

function updateMobileViewer(){

  const viewer = document.getElementById('mobileWordViewer');

  if(!allGeneratedNames.length){

    viewer.textContent = 'No words generated yet';

    return;
  }

  if(mobileIndex < 0) mobileIndex = 0;

  if(mobileIndex >= allGeneratedNames.length){

    mobileIndex = allGeneratedNames.length - 1;
  }

  viewer.textContent =
  allGeneratedNames[mobileIndex].res;
}

function nextMobileWord(){

  if(!allGeneratedNames.length) return;

  mobileIndex++;

  if(mobileIndex >= allGeneratedNames.length){

    mobileIndex = 0;
  }

  updateMobileViewer();
}

function prevMobileWord(){

  if(!allGeneratedNames.length) return;

  mobileIndex--;

  if(mobileIndex < 0){

    mobileIndex = allGeneratedNames.length - 1;
  }

  updateMobileViewer();
}

function copyMobileWord(){

  if(!allGeneratedNames.length) return;

  const word = allGeneratedNames[mobileIndex].res;

  navigator.clipboard.writeText(word);

  log(`📋 Copied: ${word}`);
}

/* ================= TOUCH SWIPE ================= */

const mobileViewer =
document.getElementById('mobileWordViewer');

let touchStartX = 0;

mobileViewer.addEventListener('touchstart', e=>{

  touchStartX = e.changedTouches[0].screenX;
});

mobileViewer.addEventListener('touchend', e=>{

  const endX = e.changedTouches[0].screenX;

  const diff = endX - touchStartX;

  if(Math.abs(diff) > 40){

    if(diff < 0){

      nextMobileWord();

    }else{

      prevMobileWord();
    }
  }
});

/* ================= CLIPBOARD ================= */

async function pasteFromClipboard(){

  try{

    const text = await navigator.clipboard.readText();

    document.getElementById('wordInput').value = text;

    log('📋 Clipboard pasted');

  }catch(err){

    log('⚠ Clipboard blocked');
  }
}

/* ================= FILES ================= */

function saveToFile(){

  let content = '';

  allGeneratedNames.forEach(i=>{

    content += `${i.pre} + ${i.suf} = ${i.res}\n`;
  });

  downloadBlob(content, 'namelist.txt');

  log('✓ File downloaded');
}

function appendToFile(){

  saveToFile();
}

function downloadBlob(text, filename){

  const blob = new Blob([text], {type:'text/plain'});

  const a = document.createElement('a');

  a.href = URL.createObjectURL(blob);

  a.download = filename;

  a.click();

  URL.revokeObjectURL(a.href);
}

/* ================= CYCLE ================= */

function toggleInfiniteCycle(){

  cycleActive = !cycleActive;

  document.getElementById('statusBadge').textContent =
  cycleActive ? 'CYCLING ∞' : 'PAUSED';

  if(cycleActive){

    cycleInterval = setInterval(()=>{

      if(!storedWords.length) return;

      const word =
      storedWords[Math.floor(Math.random()*storedWords.length)];

      const iter =
      ITERATOR_LIST[Math.floor(Math.random()*ITERATOR_LIST.length)].toUpperCase();

      const cut =
      Math.floor(Math.random()*word.length);

      const suffix = word.substring(cut);

      const res = iter + suffix;

      const obj = {
        pre:iter,
        suf:suffix,
        res:res
      };

      allGeneratedNames.push(obj);

      totalGenerated++;

      updateStats();

      displayResults([obj]);

      updateMobileViewer();

      document.getElementById('progressFill').style.width =
      (Math.random()*100) + '%';

    },150);

    log('⚡ Infinite cycle activated');

  }else{

    clearInterval(cycleInterval);

    document.getElementById('progressFill').style.width = '0%';

    log('⏸ Cycle paused');
  }
}

/* ================= TICKER ================= */

function startTicker(){

  clearInterval(seqInterval);

  const display =
  document.getElementById('tickerDisplay');

  if(!allGeneratedNames.length){

    display.textContent = 'No names';

    return;
  }

  display.classList.remove('empty');

  display.textContent = allGeneratedNames[0].res;

  seqInterval = setInterval(()=>{

    seqIndex++;

    if(seqIndex >= allGeneratedNames.length){

      seqIndex = 0;
    }

    display.style.opacity = 0;

    setTimeout(()=>{

      display.textContent =
      allGeneratedNames[seqIndex].res;

      display.style.opacity = 1;

    },150);

  },1000);
}

/* ================= SHUFFLER ================= */

function initShuffler(){

  clearInterval(shuffleInterval);

  const container =
  document.getElementById('shufflerDisplay');

  container.innerHTML = '';

  shuffleInterval = setInterval(()=>{

    if(!allGeneratedNames.length) return;

    const item =
    allGeneratedNames[
      Math.floor(Math.random()*allGeneratedNames.length)
    ];

    spawnShuffleWord(container,item);

  },650);
}

function spawnShuffleWord(container,item){

  const el = document.createElement('div');

  el.className = 'shuffle-word';

  el.textContent = item.res;

  const top =
  Math.random() * (container.clientHeight - 30);

  const left =
  Math.random() * (container.clientWidth - 120);

  el.style.top = top + 'px';
  el.style.left = left + 'px';

  container.appendChild(el);

  setTimeout(()=>{

    el.style.animation = 'hideWord .5s forwards';

    setTimeout(()=>{

      el.remove();

    },500);

  },1200);
}

/* ================= SPIRAL ================= */

const canvas =
document.getElementById('spiralCanvas');

const ctx = canvas.getContext('2d');

let angle = 0;

function resizeCanvas(){

  const p = canvas.parentElement;

  canvas.width = p.clientWidth;

  canvas.height = p.clientHeight;
}

function drawSpiral(){

  const w = canvas.width;

  const h = canvas.height;

  const cx = w/2;

  const cy = h/2;

  ctx.clearRect(0,0,w,h);

  const time = Date.now() * .001;

  for(let s=0;s<3;s++){

    ctx.beginPath();

    for(let i=0;i<340;i++){

      const a = angle + i*.08 + s*2;

      const r = i * 1.15;

      const x = cx + Math.cos(a) * r;

      const y = cy + Math.sin(a) * r;

      if(i===0){

        ctx.moveTo(x,y);

      }else{

        ctx.lineTo(x,y);
      }
    }

    const colors = [
      'rgba(0,240,255,.35)',
      'rgba(168,85,247,.28)',
      'rgba(249,115,22,.25)'
    ];

    ctx.strokeStyle = colors[s];

    ctx.lineWidth = 1.4;

    ctx.stroke();
  }

  for(let i=0;i<6;i++){

    ctx.beginPath();

    ctx.arc(cx,cy,50+i*38,0,Math.PI*2);

    ctx.strokeStyle =
    `rgba(0,240,255,${0.04+i*.01})`;

    ctx.stroke();
  }

  angle += .006;

  requestAnimationFrame(drawSpiral);
}

  document.getElementById('logText').innerHTML = msg;
