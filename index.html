<script>

/* ================= ITERATORS ================= */

const ITERATORS = [
"am","an","as","at","be","by","do","go","he","hi","if","in","is","it","me","my","no","of","on","or","ox","up","us","we","ad","ah","ai","al","aw","ba","bi","bo","da","ed","eh","el","em","er","ex","fa","ha","ho","id","jo","ka","ki","la","li","lo",
"ace","act","add","air","arm","art","bag","boy","bus","cap","car","cup","ear","fan","fun","gem","hat","jar","key","map","net","owl","pen","sun","top","van","war","all","and","any","bar","big","bit","can"
];

/* ================= STATE ================= */

let words = [];
let generated = [];
let uniqueGenerated = [];

let cycle = false;

let cycleInterval = null;
let tickerInterval = null;
let shuffleInterval = null;

let mobileIndex = 0;
let tickerIndex = 0;

/* ================= INIT ================= */

document.addEventListener('DOMContentLoaded',()=>{

  initBG();

  resizeCanvas();

  window.addEventListener('resize',resizeCanvas);

  drawSpiral();

});

/* ================= BACKGROUND ================= */

function initBG(){

  const bg = document.getElementById('bg');

  for(let i=0;i<22;i++){

    const ring = document.createElement('div');

    ring.className = 'ring';

    const size = 60 + (i * 35);

    ring.style.width = size + 'px';
    ring.style.height = size + 'px';

    ring.style.animationDuration =
    (5 + i * .6) + 's';

    bg.appendChild(ring);
  }
}

/* ================= VALID NEW WORD CHECK ================= */

/* REMOVE ORIGINAL ITERATOR WORDS */
/* REMOVE ORIGINAL INPUT WORDS */
/* ONLY KEEP TRUE GENERATED WORDS */

function isValidGeneratedWord(word){

  const upper = word.toUpperCase();

  if(words.includes(upper)) return false;

  if(ITERATORS.includes(word.toLowerCase())) return false;

  return true;
}

/* ================= GENERATION ================= */

function makeWord(word){

  const results = [];

  const w = word.toUpperCase();

  for(const prefixRaw of ITERATORS){

    const prefix = prefixRaw.toUpperCase();

    for(let i=0;i<=w.length;i++){

      const suffix = w.substring(i);

      const result = prefix + suffix;

      if(
        isValidGeneratedWord(result)
      ){

        results.push(result);
      }
    }
  }

  return results;
}

/* ================= GENERATE ================= */

function generate(){

  const input =
  document.getElementById('input').value.trim();

  if(!input){

    log('⚠ Enter words first');

    return;
  }

  const list =
  input
  .split(/[\s,;|\n]+/)
  .filter(v=>v.length);

  list.forEach(w=>{

    const up = w.toUpperCase();

    if(!words.includes(up)){

      words.push(up);
    }
  });

  updateStored();

  let batch = [];

  words.forEach(w=>{

    batch = batch.concat(makeWord(w));
  });

  /* REMOVE DUPLICATES */
  batch = [...new Set(batch)];

  /* =========================
  SMALL TO BIG ORDER
  ========================= */

  batch.sort((a,b)=>{

    if(a.length === b.length){

      return a.localeCompare(b);
    }

    return a.length - b.length;
  });

  generated = batch;

  uniqueGenerated = [...generated];

  renderWords(uniqueGenerated);

  updateStats();

  startTicker();

  startShuffle();

  randomizeMobileWord();

  updateMobile();

  document.getElementById('status').textContent =
  'GENERATED';

  log(`✓ Generated ${generated.length.toLocaleString()} new words`);

}

/* ================= OUTPUT ================= */

function renderWords(batch){

  const output =
  document.getElementById('output');

  output.innerHTML = '';

  const frag =
  document.createDocumentFragment();

  batch.forEach(word=>{

    const div =
    document.createElement('div');

    div.className = 'word';

    div.textContent = word;

    div.onclick = ()=>{

      navigator.clipboard.writeText(word);

      log(`📋 Copied ${word}`);

      mobileIndex =
      uniqueGenerated.indexOf(word);

      updateMobile();
    };

    frag.appendChild(div);
  });

  output.appendChild(frag);

}

/* ================= STORED ================= */

function updateStored(){

  const box =
  document.getElementById('stored');

  box.innerHTML = '';

  words.forEach(w=>{

    const tag =
    document.createElement('span');

    tag.className = 'tag';

    tag.textContent = w;

    box.appendChild(tag);
  });
}

/* ================= STATS ================= */

function updateStats(){

  document.getElementById('big').textContent =
  generated.length.toLocaleString();
}

/* ================= SEQUENTIAL READER ================= */

/* SMALL TO BIG */
/* ONLY TRUE GENERATED WORDS */

function startTicker(){

  clearInterval(tickerInterval);

  if(!generated.length) return;

  const ticker =
  document.getElementById('ticker');

  tickerIndex = 0;

  ticker.textContent =
  generated[0];

  tickerInterval = setInterval(()=>{

    tickerIndex++;

    if(tickerIndex >= generated.length){

      tickerIndex = 0;
    }

    ticker.textContent =
    generated[tickerIndex];

  },1000);
}

/* ================= TOP MAKINGS ================= */

/* ONLY TRUE GENERATED WORDS */

function startShuffle(){

  clearInterval(shuffleInterval);

  const box =
  document.getElementById('shuffleBox');

  box.innerHTML = '';

  shuffleInterval = setInterval(()=>{

    if(!generated.length) return;

    const word =
    generated[
      Math.floor(Math.random()*generated.length)
    ];

    const el =
    document.createElement('div');

    el.className = 'shuffle-word';

    el.textContent = word;

    const top =
    Math.random() * (box.clientHeight - 30);

    const left =
    Math.random() * (box.clientWidth - 140);

    el.style.top = top + 'px';
    el.style.left = left + 'px';

    box.appendChild(el);

    setTimeout(()=>{

      if(el.parentNode){

        el.remove();
      }

    },1500);

  },700);
}

/* ================= MOBILE PANEL ================= */

/* RANDOM NEW WORDS */
/* NOT SMALL TO BIG */
/* TRAVEL AROUND RANDOMLY */

function randomizeMobileWord(){

  if(!uniqueGenerated.length) return;

  mobileIndex =
  Math.floor(
    Math.random() * uniqueGenerated.length
  );
}

function updateMobile(){

  const viewer =
  document.getElementById('mobileWord');

  if(!uniqueGenerated.length){

    viewer.textContent =
    'No words generated yet';

    return;
  }

  if(mobileIndex < 0){

    mobileIndex =
    uniqueGenerated.length - 1;
  }

  if(mobileIndex >= uniqueGenerated.length){

    mobileIndex = 0;
  }

  viewer.textContent =
  uniqueGenerated[mobileIndex];
}

/* RANDOM NEXT */

function nextWord(){

  if(!uniqueGenerated.length) return;

  let next =
  Math.floor(
    Math.random() * uniqueGenerated.length
  );

  while(next === mobileIndex){

    next =
    Math.floor(
      Math.random() * uniqueGenerated.length
    );
  }

  mobileIndex = next;

  updateMobile();
}

/* RANDOM BACK */

function prevWord(){

  if(!uniqueGenerated.length) return;

  let prev =
  Math.floor(
    Math.random() * uniqueGenerated.length
  );

  while(prev === mobileIndex){

    prev =
    Math.floor(
      Math.random() * uniqueGenerated.length
    );
  }

  mobileIndex = prev;

  updateMobile();
}

/* COPY */

function copyWord(){

  if(!uniqueGenerated.length) return;

  navigator.clipboard.writeText(
    uniqueGenerated[mobileIndex]
  );

  log(`📋 Copied ${uniqueGenerated[mobileIndex]}`);
}

/* SWIPE */

const mobile =
document.getElementById('mobileWord');

let startX = 0;

mobile.addEventListener('touchstart',e=>{

  startX =
  e.changedTouches[0].screenX;
});

mobile.addEventListener('touchend',e=>{

  const endX =
  e.changedTouches[0].screenX;

  const diff =
  endX - startX;

  if(Math.abs(diff) > 40){

    if(diff < 0){

      nextWord();

    }else{

      prevWord();
    }
  }
});

/* ================= INFINITE CYCLE ================= */

function toggleCycle(){

  cycle = !cycle;

  document.getElementById('status').textContent =
  cycle ? 'CYCLING ∞' : 'PAUSED';

  if(cycle){

    cycleInterval = setInterval(()=>{

      if(!words.length) return;

      const word =
      words[
        Math.floor(Math.random()*words.length)
      ];

      const prefix =
      ITERATORS[
        Math.floor(Math.random()*ITERATORS.length)
      ].toUpperCase();

      const cut =
      Math.floor(Math.random()*word.length);

      const result =
      prefix + word.substring(cut);

      if(
        !generated.includes(result)
        &&
        isValidGeneratedWord(result)
      ){

        generated.push(result);

        generated.sort((a,b)=>{

          if(a.length === b.length){

            return a.localeCompare(b);
          }

          return a.length - b.length;
        });

        uniqueGenerated = [...generated];

        renderWords(uniqueGenerated);

        updateStats();

        startTicker();

        updateMobile();

      }

      document.getElementById('progress').style.width =
      (Math.random()*100)+'%';

    },180);

    log('⚡ Infinite cycle active');

  }else{

    clearInterval(cycleInterval);

    document.getElementById('progress').style.width =
    '0%';

    log('⏸ Cycle paused');
  }
}

/* ================= DOWNLOAD ================= */

function saveFile(){

  if(!generated.length){

    log('⚠ No generated words');

    return;
  }

  let txt =
  'INFINITE NAMING ENGINE\n\n';

  generated.forEach(w=>{

    txt += w + '\n';
  });

  const blob =
  new Blob([txt], {type:'text/plain'});

  const a =
  document.createElement('a');

  a.href =
  URL.createObjectURL(blob);

  a.download =
  'generated-words.txt';

  a.click();

  URL.revokeObjectURL(a.href);

  log('✓ Downloaded generated words');
}

/* ================= CLIPBOARD ================= */

async function pasteClipboard(){

  try{

    const txt =
    await navigator.clipboard.readText();

    document.getElementById('input').value =
    txt;

    log('📋 Pasted clipboard');

  }catch(err){

    log('⚠ Clipboard blocked');
  }
}

/* ================= SPIRAL ================= */

const canvas =
document.getElementById('canvas');

const ctx =
canvas.getContext('2d');

let angle = 0;

function resizeCanvas(){

  const p =
  canvas.parentElement;

  canvas.width =
  p.clientWidth;

  canvas.height =
  p.clientHeight;
}

function drawSpiral(){

  const w = canvas.width;
  const h = canvas.height;

  const cx = w / 2;
  const cy = h / 2;

  ctx.clearRect(0,0,w,h);

  for(let s=0;s<3;s++){

    ctx.beginPath();

    for(let i=0;i<320;i++){

      const a =
      angle + (i * .08) + (s * 2);

      const r =
      i * 1.1;

      const x =
      cx + Math.cos(a) * r;

      const y =
      cy + Math.sin(a) * r;

      if(i===0){

        ctx.moveTo(x,y);

      }else{

        ctx.lineTo(x,y);
      }
    }

    const colors = [
      'rgba(0,240,255,.35)',
      'rgba(168,85,247,.25)',
      'rgba(249,115,22,.2)'
    ];

    ctx.strokeStyle =
    colors[s];

    ctx.lineWidth = 1.3;

    ctx.stroke();
  }

  angle += .004;

  requestAnimationFrame(drawSpiral);
}

/* ================= LOG ================= */

function log(msg){

  document.getElementById('log').textContent =
  msg;
}

</script>
